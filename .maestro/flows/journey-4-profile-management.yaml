appId: com.plotrent.app
name: "Journey 4: Profile Management"
tags:
  - profile
  - settings
---
# ── Auth: Launch and sign in as renter ──
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
        id: "onboarding-screen"
    timeout: 30000
- openLink: "plotrent://dev-login?email=renter1@plotrent.dev&password=password123"
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000

# ── Navigate to Profile tab (4th tab) ──
- tapOn:
    point: "88%,93%"
- waitForAnimationToEnd:
    timeout: 5000

# ── Verify profile info ──
- extendedWaitUntil:
    visible: "Ana Costa"
    timeout: 10000
- assertVisible: "Member since 2025"

# ── Scroll to achievements ──
- scrollUntilVisible:
    element: "Garden Achievements"
    direction: DOWN
- assertVisible: "Garden Achievements"

# ── Tap Switch Role ──
- scrollUntilVisible:
    element:
        id: "profile-switch-role"
    direction: DOWN
- tapOn:
    id: "profile-switch-role"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Choose Your Role"

# ── Select "I do both" and confirm ──
- tapOn:
    id: "role-option-both"
- waitForAnimationToEnd
- tapOn:
    id: "role-select-continue"
- waitForAnimationToEnd:
    timeout: 5000

# ── Navigate back to Profile ──
- tapOn:
    point: "88%,93%"
- waitForAnimationToEnd:
    timeout: 3000

# ── Sign Out ──
- scrollUntilVisible:
    element:
        id: "profile-sign-out"
    direction: DOWN
- tapOn:
    id: "profile-sign-out"
- waitForAnimationToEnd
- tapOn:
    text: "Sign Out"
- waitForAnimationToEnd:
    timeout: 3000
