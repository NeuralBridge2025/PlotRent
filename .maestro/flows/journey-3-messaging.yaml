appId: com.plotrent.app
name: "Journey 3: Messaging from Plot Details"
tags:
  - messaging
  - chat
---
# ── Auth: Launch and sign in as renter ──
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
        id: "onboarding-screen"
    timeout: 30000
- openLink: "plotrent://dev-login?email=renter1@plotrent.dev&password=password123"
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
        id: "plot-card-aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
    timeout: 20000

# ── Tap plot card to view details ──
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "Plot Vitality"
- assertVisible: "Maria Santos"

# ── Navigate to chat via deep link (avoids sticky booking bar overlap) ──
- openLink: "plotrent://chat/11111111-1111-1111-1111-111111111111"
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# ── Verify chat screen ──
- extendedWaitUntil:
    visible: "Direct message"
    timeout: 10000
- assertVisible: "Maria"

# ── Send a message ──
- tapOn:
    id: "chat-message-input"
- inputText: "Hello from Maestro E2E test!"
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd:
    timeout: 5000

# ── Scroll to bottom to see sent message ──
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Hello from Maestro E2E test!"
